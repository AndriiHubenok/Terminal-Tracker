services:
  db:
    image: postgis/postgis:15-3.3
    container_name: banking_geo_db
    environment:
      POSTGRES_USER: bank_admin
      POSTGRES_PASSWORD: secret_password
      POSTGRES_DB: terminal_tracker_db
    ports:
      - "5433:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U bank_admin -d terminal_tracker_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgis_data:

