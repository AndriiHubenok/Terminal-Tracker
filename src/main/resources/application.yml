spring:
  application:
    name: Terminal-tracker
  datasource:
    url: jdbc:postgresql://localhost:5433/terminal_tracker_db
    username: bank_admin
    password: secret_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        type:
          json:
            format_mapper: org.hibernate.type.format.jackson.JacksonJsonFormatMapper

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000

